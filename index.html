<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-MANNIOT | Teatropica</title>

<link rel="stylesheet" href="style.css">

<!-- knihovna na PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
    <h1>T-MANNIOT</h1>
    <p>#1 Teatropica Hotel</p>
</header>

<section>
    <h2>O hotelu</h2>
    <p>Vítejte na ostrově Teatropica. Tropický ráj, kde luxus potkává přírodu.</p>
</section>

<section>
    <h2>Pokoje & ceny</h2>
    <div class="card">
        <h3>Ocean Room</h3>
        <p>10 T-t / noc</p>
    </div>
    <div class="card">
        <h3>Luxury Palm Suite</h3>
        <p>100 T-t / noc</p>
    </div>
</section>

<section>
    <h2>Atrakce</h2>
    <p>Jen pár kroků od hotelu se nachází tropický waterpark plný skluzavek a bazénů.</p>
</section>

<section>
    <h2>Rezervace</h2>

    <form id="bookingForm">
        <input type="text" placeholder="Jméno" required>
        <input type="date" required>
        <input type="number" placeholder="Počet nocí" required>
        <button type="submit">Vytvořit rezervaci</button>
    </form>

</section>

<script src="script.js"></script>

</body>
</html>
